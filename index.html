  <title>コレクティブ</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#256fe6;--blue2:#1456c8;--line:#dfe7f3;--bg:#f6f8fc;--text:#253044;--muted:#718198;--shadow:0 10px 26px rgba(38,76,132,.08)}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans JP",sans-serif;background:linear-gradient(180deg,#fbfcff 0%,var(--bg) 100%);color:var(--text);line-height:1.4}

    .fortune-hud{min-width:132px;border:1px solid #cfe0ff;border-radius:18px;background:linear-gradient(180deg,#fff 0%,#f1f7ff 100%);box-shadow:0 8px 22px rgba(37,111,230,.12);padding:9px 14px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:transform .18s ease,box-shadow .18s ease}
    .fortune-hud:active{transform:scale(.97)}.fortune-label{font-size:12px;font-weight:900;color:#53739f;letter-spacing:.05em}.fortune-result{font-size:23px;font-weight:1000;line-height:1.12;letter-spacing:.06em}
    .fortune-hud,.fortune-panel-result{position:relative;overflow:hidden}.fortune-hud::before,.fortune-panel-result::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.55;background:linear-gradient(135deg,rgba(255,255,255,.42),rgba(255,255,255,0) 38%,rgba(255,255,255,.22) 70%,rgba(255,255,255,0))}.fortune-hud::after,.fortune-panel-result::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.23;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.35) 0 1px,rgba(0,0,0,0) 1px 7px);mix-blend-mode:soft-light}
    .fortune-hud.daikichi,.fortune-panel-result.daikichi{border-color:#efc85b;background:radial-gradient(circle at 30% 10%,#fffbe4 0%,#ffe89a 42%,#d8a51f 100%)!important;color:#835200!important}.fortune-hud.chukichi,.fortune-panel-result.chukichi{border-color:#f2a8a8;background:linear-gradient(180deg,#fff9f9 0%,#ffdcdc 58%,#f5a1a1 100%)!important;color:#a53a3a!important}.fortune-hud.kichi,.fortune-panel-result.kichi{border-color:#e4e8ef;background:linear-gradient(180deg,#fff 0%,#fbfcff 100%)!important;color:#2b5fac!important}.fortune-hud.kobakichi,.fortune-panel-result.kobakichi{border-color:#aaddff;background:linear-gradient(180deg,#f9feff 0%,#d9f3ff 58%,#9bdcff 100%)!important;color:#0d70ae!important}.fortune-hud.ponkichi,.fortune-panel-result.ponkichi{border-color:#b7eaa7;background:linear-gradient(180deg,#fbfff8 0%,#e2facd 58%,#b7ec8c 100%)!important;color:#3b7b22!important}.fortune-hud.yasukichi,.fortune-panel-result.yasukichi{border-color:#dbc7a4;background:linear-gradient(180deg,#fffdf8 0%,#f2e6d1 60%,#d8bf95 100%)!important;color:#76552c!important}.fortune-hud.babikichi,.fortune-panel-result.babikichi{border-color:#8d72cc;background:radial-gradient(circle at 20% 12%,rgba(202,179,255,.92) 0%,rgba(101,73,173,.72) 22%,rgba(39,29,70,.96) 58%,#120d22 100%)!important;color:#f3edff!important;box-shadow:0 0 0 1px rgba(211,190,255,.25),0 14px 34px rgba(61,34,132,.35),0 0 26px rgba(137,95,255,.20);text-shadow:0 0 8px rgba(216,198,255,.55)}
    .fortune-hud.first-open .fortune-result{animation:fortunePop .58s cubic-bezier(.16,1.35,.34,1) both}.fortune-hud.babikichi{animation:babiHudWaver 2.4s ease-in-out infinite}.fortune-panel-result.babikichi{animation:babiPanelWaver 2.8s ease-in-out infinite}.fortune-hud.babikichi::after,.fortune-panel-result.babikichi::after{opacity:.38;background-image:repeating-linear-gradient(115deg,rgba(255,255,255,.14) 0 1px,transparent 1px 9px);mix-blend-mode:screen;animation:babiNoise 1.4s steps(2,end) infinite}
    @keyframes fortunePop{0%{transform:scale(.62) rotate(-4deg);opacity:0}65%{transform:scale(1.12) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}@keyframes babiHudWaver{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-1px) rotate(.4deg)}}@keyframes babiPanelWaver{0%,100%{filter:hue-rotate(0) brightness(1)}50%{filter:hue-rotate(8deg) brightness(1.08)}}@keyframes babiNoise{0%{transform:translateX(0)}50%{transform:translateX(3px)}100%{transform:translateX(-1px)}}
    .fortune-panel-backdrop{position:fixed;inset:0;display:none;align-items:flex-start;justify-content:flex-end;padding:78px 18px 18px;background:rgba(20,31,48,.22);backdrop-filter:blur(3px);z-index:1400}.fortune-panel-backdrop.active{display:flex}.fortune-panel{width:min(330px,calc(100vw - 36px));border-radius:24px;background:linear-gradient(180deg,#fff 0%,#f5f9ff 100%);border:1px solid #d5e4ff;box-shadow:0 20px 48px rgba(22,43,77,.22);padding:18px;animation:fortunePanelIn .22s ease forwards}.fortune-panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.fortune-panel-title{font-size:15px;font-weight:900;color:#53739f;letter-spacing:.06em}.fortune-close{border:none;background:#eef5ff;color:#315f9d;border-radius:999px;width:34px;height:34px;font-size:20px;cursor:pointer}.fortune-panel-result{min-height:116px;display:flex;align-items:center;justify-content:center;border-radius:20px;border:1px solid rgba(198,216,246,.8);font-size:44px;font-weight:1000;letter-spacing:.08em;margin-bottom:12px}.fortune-panel-note{font-size:13px;font-weight:700;color:#6f7f97;line-height:1.55;text-align:center}@keyframes fortunePanelIn{from{transform:translateY(-8px) scale(.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}

    .summary{display:flex;gap:12px;margin-bottom:16px;align-items:stretch}.summary-card{flex:1;display:none;border-radius:20px;padding:14px;background:linear-gradient(180deg,#fffdf8 0%,#fff6e7 100%);border:1px solid #f0dfc0;box-shadow:0 10px 24px rgba(148,95,22,.08)}.summary-card h2{display:flex;align-items:center;gap:8px;font-size:17px;color:#7d4b12;margin-bottom:10px}.summary-card h2::before{content:"";width:9px;height:9px;border-radius:999px;background:linear-gradient(180deg,#ffbf58,#f08a18);box-shadow:0 0 0 5px rgba(240,138,24,.12)}#tomorrowSummary{background:linear-gradient(180deg,#fbfdff 0%,#edf6ff 100%);border-color:#cfe1fb}#tomorrowSummary h2{color:#225ea8}#tomorrowSummary h2::before{background:linear-gradient(180deg,#74b7ff,#2f78df);box-shadow:0 0 0 5px rgba(47,120,223,.12)}.summary-list{display:flex;flex-direction:column;gap:8px}.summary-swipe-card{position:relative;overflow:hidden;border-radius:14px;touch-action:pan-y}.summary-mini-card{position:relative;z-index:1;padding:9px 10px;border-radius:14px;border:1px solid rgba(225,229,238,.92);background:rgba(255,255,255,.86);box-shadow:0 3px 10px rgba(37,72,125,.055);cursor:pointer;touch-action:pan-y;transform:translate3d(0,0,0)}.summary-mini-card:active{transform:scale(.988)}.summary-mini-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}.summary-mini-tag{display:inline-flex;align-items:center;padding:3px 7px;border-radius:999px;color:#fff;font-size:11px;font-weight:900}.summary-mini-tag.sub{background:#5b6472!important}.summary-mini-note{color:#2d3542;font-size:13px;line-height:1.35;overflow-wrap:anywhere}.summary-more{padding:6px 4px 0;color:#7c8796;font-size:12px;font-weight:800;text-align:right}

    .calendar-shell{margin-top:4px}.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px}.weekday{text-align:center;font-size:13px;font-weight:900;color:#777;padding:2px 0 4px}.weekday.sun{color:#d94b4b}.weekday.sat{color:#2f6fd9}.calendar-window{height:calc(120px * 4 + 8px * 3 + 2px);overflow-y:auto;overscroll-behavior:contain;border:1px solid #dfe7f3;border-radius:20px;padding:10px;background:rgba(255,255,255,.76);box-shadow:var(--shadow);scroll-behavior:smooth}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day-cell{position:relative;min-height:120px;background:#fff;border:1px solid #e5e5e0;border-radius:14px;padding:8px;overflow:hidden;box-shadow:0 3px 12px rgba(38,76,132,.055);cursor:pointer;-webkit-tap-highlight-color:transparent}.day-cell:active{transform:scale(.992)}.day-cell.level-0{background:#fff;border-color:#e5e5e0}.day-cell.level-1{background:linear-gradient(180deg,#fffef8 0%,#fff0cf 100%);border-color:#ecd5a1}.day-cell.level-2{background:linear-gradient(180deg,#fff8ef 0%,#ffd8aa 100%);border-color:#efb46a}.day-cell.level-3{background:linear-gradient(180deg,#fff0e1 0%,#ffb06f 58%,#ff9356 100%);border-color:#ea7a34;box-shadow:0 10px 22px rgba(234,122,52,.22)}.day-cell.level-4{background:radial-gradient(circle at top,#fff1d6 0%,#ffb36b 28%,#ff7a45 62%,#e34a1f 100%);border-color:#d84c21;box-shadow:0 14px 28px rgba(227,74,31,.28);animation:firePulse 1.8s ease-in-out infinite}@keyframes firePulse{50%{box-shadow:0 18px 34px rgba(227,74,31,.38);transform:translateY(-1px)}}.day-cell.sunday{border-color:#f2c6cf;background:linear-gradient(180deg,#fffafa 0%,#fff4f6 100%)}.day-cell.saturday{border-color:#c5d9fb;background:linear-gradient(180deg,#fbfdff 0%,#f0f7ff 100%)}.day-cell.past-day{background:linear-gradient(180deg,#f3f5f8 0%,#eceff4 100%)!important;border-color:#d7dee8!important;box-shadow:none!important;filter:saturate(.55)}.day-cell.past-day::after{content:"";position:absolute;inset:0;background:rgba(238,     .overlay{position:fixed;inset:0;background:rgba(20,31,48,.42);backdrop-filter:blur(3px);display:none;justify-content:center;align-items:flex-end;z-index:1000}.overlay.active{display:flex}.overlay-panel{background:#fff;width:100%;max-height:90vh;border-top-left-radius:24px;border-top-right-radius:24px;overflow-y:auto;padding:16px;box-shadow:0 -18px 44px rgba(21,35,58,.18)}.overlay-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.overlay-header h2{font-size:18px}.close-btn{border:none;background:#eef5ff;color:#315f9d;border-radius:999px;width:38px;height:38px;font-size:24px;line-height:1;cursor:pointer}.add-form{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;margin-top:12px;box-shadow:0 1px 2px rgba(0,0,0,.05)}.add-form h3{font-size:16px;margin-bottom:8px}.form-group{margin-bottom:12px}.form-group label{display:block;font-size:14px;margin-bottom:4px}.form-group select,.form-group input[type=text]{width:100%;padding:10px;font-size:16px;border:1px solid #ccc;border-radius:10px}.add-form button{display:block;width:100%;padding:12px;font-size:16px;color:#fff;background:#1890ff;border:none;border-radius:12px;cursor:pointer}.complete-toast{position:sticky;top:8px;z-index:4;margin:0 0 10px;padding:12px 14px;border-radius:14px;background:linear-gradient(180deg,#eefaf1,#ddf3e3);border:1px solid #b5debf;color:#236934;font-size:14px;font-weight:900;box-shadow:0 8px 18px rgba(25,80,40,.10);opacity:0;transform:translateY(-8px) scale(.98);pointer-events:none;transition:opacity .22s ease,transform .22s ease}.complete-toast.show{opacity:1;transform:translateY(0) scale(1)}.complete-toast .sub{display:block;margin-top:2px;font-size:12px;font-weight:700;color:#477255}
    .day-card{position:relative;overflow:hidden;border-radius:14px;margin-bottom:8px;touch-action:pan-y}.swipe-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:14px;background:linear-gradient(180deg,#fff4e8,#fde9d6);color:#9a5a1a;font-size:13px;font-weight:900;border-radius:14px}.swipe-bg.active-card{justify-content:space-between;padding:0 14px}.swipe-bg.right{justify-content:flex-start;padding-left:14px;background:linear-gradient(180deg,#eef8ef,#dff2e0);color:#2f7a39}.swipe-bg.active-left{background:linear-gradient(180deg,#fff1df,#fcd7b0)}.swipe-bg.active-right{background:linear-gradient(180deg,#ecf8ee,#cbeccf)}.swipe-complete-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.9);border:1px solid rgba(154,90,26,.22);font-size:12px;font-weight:900}.swipe-complete-label{font-size:13px;font-weight:900;letter-spacing:.06em}.summary-swipe-card .swipe-bg{justify-content:flex-end!important;padding-right:16px!important}.card-shell{position:relative;z-index:1;min-height:92px;background:#fafafa;border:1px solid #e5e5e5;border-left-width:4px;border-radius:14px;padding:8px 12px;display:flex;flex-direction:column;gap:4px;transition:transform .22s ease,opacity .22s ease,box-shadow .22s ease;box-shadow:0 1px 2px rgba(0,0,0,.03)}.card-shell.swiping{box-shadow:0 10px 18px rgba(0,0,0,.08)}.card-shell.completing{transform:translateX(-26px) scale(.97);opacity:.55;box-shadow:0 0 0 4px rgba(154,90,26,.12),0 16px 28px rgba(0,0,0,.12);filter:saturate(.82)}.card-shell.complete-flash{box-shadow:0 0 0 4px rgba(242,181,92,.28),0 14px 26px rgba(0,0,0,.10)}.card-shell .tags{display:flex;gap:6px;flex-wrap:wrap}.card-shell .tag{font-size:12px;padding:2px 6px;border-radius:6px;color:#fff}.card-shell .note{font-size:14px;color:#333}.swipe-hint{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:11px;color:#9a5a1a;font-weight:700}.complete-stamp{position:absolute;right:18px;top:14px;transform:rotate(-8deg);padding:10px 14px;border:3px solid #b86b1f;color:#b86b1f;background:rgba(255,247,235,.98);border-radius:14px;font-size:18px;font-weight:1000;letter-spacing:.12em;box-shadow:0 10px 24px rgba(0,0,0,.12);pointer-events:none;z-index:3}.complete-burst{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:4}.complete-burst-badge{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:140px;padding:14px 18px;border-radius:20px;background:radial-gradient(circle at top,#fffef4 0%,#ffe9b5 55%,#ffd67a 100%);border:2px solid #efb84f;color:#8e5300;box-shadow:0 12px 28px rgba(197,135,22,.28);animation:burstPop .34s cubic-bezier(.2,.9,.25,1.2) forwards}.complete-burst-main{font-size:28px;line-height:1;font-weight:1000}.complete-burst-sub{font-size:12px;font-weight:800}@keyframes burstPop{0%{transform:scale(.45) rotate(-7deg);opacity:0}65%{transform:scale(1.08) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}

    function renderFortune(){const f=getTodayFortune();const key=getTodayKey();const hud=document.getElementById('fortuneHud'),hr=document.getElementById('fortuneHudResult'),pr=document.getElementById('fortunePanelResult');if(!hud||!hr||!pr)return;hud.className=`fortune-hud ${f.key}`;pr.className=`fortune-panel-result ${f.key}`;if(localStorage.getItem('fortuneSeenDate')!==key){hud.classList.add('first-open');localStorage.setItem('fortuneSeenDate',key);setTimeout(()=>hud.classList.remove('first-open'),900)}hr.textContent=f.name;pr.textContent=f.name}

    function renderSummary(){const todayElem=document.getElementById('todaySummary'),tomorrowElem=document.getElementById('tomorrowSummary');const today=new Date();today.setHours(0,0,0,0);const tomorrow=new Date(today);tomorrow.setDate(tomorrow.getDate()+1);const todayTasks=[],tomorrowTasks=[];tasks.forEach(t=>{if(t.status!=='done'){const due=new Date(t.date);due.setHours(0,0,0,0);if(due<=today)todayTasks.push(t);else if(due<=tomorrow)tomorrowTasks.push(t)}});todayTasks.sort((a,b)=>new Date(a.date)-new Date(b.date));tomorrowTasks.sort((a,b)=>new Date(a.date)-new Date(b.date));renderSummaryList(todayElem,todayTasks);renderSummaryList(tomorrowElem,tomorrowTasks)}
    function renderSummaryList(section,list){const container=section.querySelector('.summary-list');container.innerHTML='';if(!list.length){section.style.display='none';return}section.style.display='block';const max=5;list.slice(0,max).forEach(t=>{const wrap=document.createElement('div');wrap.className='summary-swipe-card';const bg=document.createElement('div');bg.className='swipe-bg active-card';bg.innerHTML='<span class="swipe-complete-label">左スワイプで完了</span>';wrap.appendChild(bg);const card=document.createElement('div');card.className='summary-mini-card';card.style.borderLeft='4px solid '+(CATEGORY_COLORS[t.category]||'#1890ff');card.addEventListener('click',()=>openOverlay(t.date));const tags=document.createElement('div');tags.className='summary-mini-tags';const cat=document.createElement('span');cat.className='summary-mini-tag';cat.style.background=CATEGORY_COLORS[t.category]||'#1890ff';cat.textContent=t.category;tags.appendChild(cat);if(t.subcategory){const sub=document.createElement('span');sub.className='summary-mini-tag sub';sub.textContent=t.subcategory;tags.appendChild(sub)}card.appendChild(tags);if(t.note){const note=document.createElement('div');note.className='summary-mini-note';note.textContent=t.note;card.appendChild(note)}wrap.appendChild(card);attachSwipe(card,()=>{t.status='done';saveTasks();refresh()},null,{summary:true});container.appendChild(wrap)});if(list.length>max){const more=document.createElement('div');more.className='summary-more';more.textContent='ほか'+(list.length-max)+'件';container.appendChild(more)}}

    function renderCalendar(){const calendar=document.getElementById('calendar');calendar.innerHTML='';const today=new Date();today.setHours(0,0,0,0);const start=getStartSunday(today);const limit=addMonths(today,6);const end=getStartSunday(limit);end.setDate(end.getDate()+6);for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){const cur=new Date(d);const cell=document.createElement('div');cell.className='day-cell';cell.dataset.date=formatDate(cur);const num=document.createElement('div');num.className='day-number';num.textContent=cur.getDate();const dow=cur.getDay();if(dow===0){num.classList.add('sun');cell.classList.add('sunday')}else if(dow===6){num.classList.add('sat');cell.classList.add('saturday')}if(cur<today)cell.classList.add('past-day');if(cur.getTime()===today.getTime()){cell.classList.add('today');cell.id='todayCell'}if(cur.getDate()===1){cell.classList.add("month-start");const ml=document.createElement('div');ml.className='month-label';ml.textContent=(cur.getMonth()+1)+'月';cell.appendChild(ml)}cell.appendChild(num);const active=tasks.filter(t=>t.status!=='done'&&t.date===formatDate(cur));const count=active.length;cell.classList.add('level-'+Math.min(count,4));cell.dataset.taskCount=String(count);const badge=document.createElement('div');badge.className='day-count-badge';badge.textContent=count>=4?'4+':String(count);cell.appendChild(badge);const items=document.createElement('div');items.className='day-items';active.slice(0,4).forEach(t=>{const tag=document.createElement('span');tag.className='mini-tag';tag.textContent=t.category;tag.style.background=CATEGORY_COLORS[t.category]||'#ccc';items.appendChild(tag)});if(count>4){const plus=document.createElement('span');plus.className='mini-tag plus';plus.textContent='+'+(count-4)+'件';items.appendChild(plus)}cell.appendChild(items);cell.addEventListener('click',()=>openOverlay(cell.dataset.date));calendar.appendChild(cell)}}

    function createSwipeCard(t,mode){const wrap=document.createElement('div');wrap.className='day-card';const leftBg=document.createElement('div');leftBg.className='swipe-bg'+(mode!=='done'?' active-card':'');leftBg.innerHTML=mode==='done'?'← 左スワイプで消す':'<span class="swipe-complete-pill"><span>✓</span><span>完了</span></span><span class="swipe-complete-label">左スワイプで完了</span>';wrap.appendChild(leftBg);if(mode==='done'){const rightBg=document.createElement('div');rightBg.className='swipe-bg right';rightBg.innerHTML='右スワイプで戻す →';wrap.appendChild(rightBg)}const card=document.createElement('div');card.className='card-shell'+(mode==='done'?' done-mode':'');card.style.borderLeftColor=CATEGORY_COLORS[t.category]||'#1890ff';const tags=document.createElement('div');tags.className='tags';const cat=document.createElement('span');cat.className='tag';cat.style.background=CATEGORY_COLORS[t.category]||'#1890ff';cat.textContent=t.category;tags.appendChild(cat);if(t.subcategory){const sub=document.createElement('span');sub.className='tag';sub.style.background='#595959';sub.textContent=t.subcategory;tags.appendChild(sub)}card.appendChild(tags);const note=document.createElement('div');note.className='note';note.textContent=t.note||'';card.appendChild(note);const due=document.createElement('div');due.style.fontSize='12px';due.style.color='#888';due.textContent='期日: '+t.date;card.appendChild(due);const hint=document.createElement('div');hint.className='swipe-hint';hint.innerHTML=mode==='done'?'→戻す / ←消す':'←左スワイプで完了';card.appendChild(hint);wrap.appendChild(card);return wrap}
    function attachSwipe(card,onLeft,onRight,opts={}){let startX=0,currentX=0,drag=false;const allowRight=typeof onRight==='function';const wrap=card.parentElement;const bgs=wrap?[...wrap.querySelectorAll('.swipe-bg')]:[];function clear(){bgs.forEach(bg=>bg.classList.remove('active-left','active-right'))}function reset(){card.classList.add('swipe-anim');card.style.transform='translateX(0px)';card.style.opacity='1';card.classList.remove('swiping','completing','complete-flash');clear();setTimeout(()=>card.classList.remove('swipe-anim'),240)}function complete(dir,cb){card.classList.add('swipe-anim','complete-flash');card.classList.remove('swiping');clear();if(dir<0&&!opts.summary){card.classList.add('completing');const stamp=document.createElement('div');stamp.className='complete-stamp';stamp.textContent=card.classList.contains('done-mode')?'消す':'完了!';card.appendChild(stamp);if(!card.classList.contains('done-mode')){const burst=document.createElement('div');burst.className='complete-burst';burst.innerHTML='<div class="complete-burst-badge"><div class="complete-burst-main">✓ 完了！</div><div class="complete-burst-sub">終わった課題へ移動</div></div>';card.appendChild(burst)}}card.style.transform=`translateX(${dir*210}px) scale(${dir<0?1.02:1})`;card.style.opacity='0';setTimeout(cb,dir<0?360:220)}card.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;currentX=startX;drag=true;card.classList.remove('swipe-anim','complete-flash');card.classList.add('swiping')},{passive:true});card.addEventListener('touchmove',e=>{if(!drag)return;currentX=e.touches[0].clientX;const raw=currentX-startX;const dx=allowRight?Math.max(Math.min(raw,132),-132):Math.max(Math.min(raw,0),-132);card.style.transform=`translateX(${dx}px)`;clear();if(dx<-20)bgs.forEach(bg=>bg.classList.add('active-left'));if(allowRight&&dx>20)bgs.forEach(bg=>bg.classList.add('active-right'))},{passive:true});card.addEventListener('touchend',()=>{if(!drag)return;drag=false;const raw=currentX-startX;const dx=allowRight?raw:Math.min(raw,0);if(dx<-56&&onLeft){complete(-1,onLeft);return}if(allowRight&&dx>72&&onRight){complete(1,onRight);return}reset()});card.addEventListener('touchcancel',()=>{drag=false;reset()})}

    function renderDone(){const list=document.getElementById('doneList');list.innerHTML='';const done=tasks.filter(t=>t.status==='done');done.forEach(t=>{const wrap=createSwipeCard(t,'done');attachSwipe(wrap.querySelector('.card-shell'),()=>{tasks=tasks.filter(x=>x.id!==t.id);saveTasks();refresh()},()=>{t.status='active';saveTasks();refresh()});list.appendChild(wrap)})}
    function showCompleteToast(title,sub){const toast=document.getElementById('completeToast');if(!toast)return;toast.innerHTML=`${title}<span class="sub">${sub||''}</span>`;toast.classList.add('show');clearTimeout(showCompleteToast._timer);showCompleteToast._timer=setTimeout(()=>toast.classList.remove('show'),1600)}
    function openOverlay(date){currentDate=date;document.getElementById('overlayDate').textContent=date;const list=document.getElementById('dayCardList');list.innerHTML='';const dayTasks=tasks.filter(t=>t.date===date&&t.status!=='done');if(!dayTasks.length){const empty=document.createElement('div');empty.style.padding='14px 16px';empty.style.border='1px dashed #ddd';empty.style.borderRadius='12px';empty.style.background='#fcfcfc';empty.style.color='#777';empty.textContent='この日の予定はありません。';list.appendChild(empty)}dayTasks.forEach(t=>{const wrap=createSwipeCard(t,'active');attachSwipe(wrap.querySelector('.card-shell'),()=>{t.status='done';saveTasks();renderSummary();renderCalendar();renderDone();openOverlay(currentDate);setTimeout(()=>showCompleteToast('完了しました','「終わった課題」に移動しました。'),30)},null);list.appendChild(wrap)});document.getElementById('category').value='';document.getElementById('subcategoryGroup').style.display='none';document.getElementById('subcategory').innerHTML='<option value="">選択してください</option>';document.getElementById('noteGroup').style.display='none';document.getElementById('note').value='';document.getElementById('saveBtn').disabled=true;document.getElementById('overlay').classList.add('active')}
    function closeOverlay(){document.getElementById('overlay').classList.remove('active')}

    function showTodoToast(message){const toast=document.getElementById('todoToast');toast.textContent=message;toast.classList.add('show');clearTimeout(showTodoToast._timer);showTodoToast._timer=setTimeout(()=>toast.classList.remove('show'),1200)}
    function createTodoMemoCard(todo){const wrap=document.createElement('div');wrap.className='todo-card';const bg=document.createElement('div');bg.className='todo-swipe-bg';bg.textContent='左スワイプで消す';wrap.appendChild(bg);const shell=document.createElement('div');shell.className='todo-shell';const bullet=document.createElement('div');bullet.className='todo-bullet';bullet.textContent='・';shell.appendChild(bullet);const note=document.createElement('div');note.className='todo-note';note.textContent=todo.note;const hint=document.createElement('div');hint.className='todo-hint';hint.textContent='左へ';shell.appendChild(note);shell.appendChild(hint);wrap.appendChild(shell);return wrap}
    function attachTodoSwipe(card,onDelete){let startX=0,currentX=0,drag=false,armed=false;const wrap=card.parentElement,bg=wrap.querySelector('.todo-swipe-bg');function setX(dx){card.style.transform='translate3d('+dx+'px,0,0)'}function setProgress(v){const p=Math.max(0,Math.min(1,v));const next=p>=1;if(next!==armed){armed=next;if(armed&&navigator.vibrate)navigator.vibrate(8)}card.classList.toggle('todo-armed',armed);bg.classList.toggle('release-ready',armed)}function reset(){card.style.transition='transform .34s cubic-bezier(.16,1,.3,1), opacity .22s ease, box-shadow .22s ease';setX(0);setProgress(0);card.style.opacity='1';card.classList.remove('swiping','deleting','todo-armed');bg.classList.remove('release-ready');setTimeout(()=>card.style.transition='',360)}card.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;currentX=startX;drag=true;armed=false;card.style.transition='none';card.classList.add('swiping')},{passive:true});card.addEventListener('touchmove',e=>{if(!drag)return;currentX=e.touches[0].clientX;const raw=Math.min(currentX-startX,0);const dx=Math.max(raw,-154);const eased=-Math.pow(Math.abs(dx),.94);setX(eased);setProgress(Math.min(1,Math.abs(eased)/108))},{passive:true});card.addEventListener('touchend',()=>{if(!drag)return;drag=false;const dx=Math.min(currentX-startX,0);if(dx<-62){card.classList.add('deleting');setProgress(1);wrap.style.height=wrap.offsetHeight+'px';requestAnimationFrame(()=>{card.style.transition='transform .34s cubic-bezier(.22,1,.36,1), opacity .24s ease';card.style.transform='translate3d('+(-window.innerWidth*.64)+'px,0,0) scale(.96)';card.style.opacity='0';setTimeout(()=>{wrap.style.overflow='hidden';wrap.style.height='0px';wrap.style.opacity='0'},120)});setTimeout(onDelete,330);return}reset()})}
    function renderTodoMemos(){const list=document.getElementById('todoList');list.innerHTML='';if(!todoMemos.length){const empty=document.createElement('div');empty.className='todo-empty';empty.textContent='日付を決めないメモをここに置けます。';list.appendChild(empty);return}todoMemos.forEach(todo=>{const wrap=createTodoMemoCard(todo);attachTodoSwipe(wrap.querySelector('.todo-shell'),()=>{todoMemos=todoMemos.filter(x=>x.id!==todo.id);saveTodoMemos();renderTodoMemos();showTodoToast('to do メモを消しました')});list.appendChild(wrap)})}

    const categorySelect=document.getElementById('category'),subcategorySelect=document.getElementById('subcategory'),subcategoryGroup=document.getElementById('subcategoryGroup'),noteInput=document.getElementById('note'),noteGroup=document.getElementById('noteGroup'),saveBtn=document.getElementById('saveBtn');
    categorySelect.addEventListener('change',()=>{const c=categorySelect.value;if(!c){subcategoryGroup.style.display='none';noteGroup.style.display='none';saveBtn.disabled=true;return}const subs=CATEGORY_MAP[c]||[];if(!subs.length){subcategoryGroup.style.display='none';subcategorySelect.innerHTML='<option value="">選択してください</option>';noteGroup.style.display='block';saveBtn.disabled=false;return}subcategorySelect.innerHTML='<option value="">選択してください</option>';subs.forEach(sub=>{const opt=document.createElement('option');opt.value=sub;opt.textContent=sub;subcategorySelect.appendChild(opt)});subcategoryGroup.style.display='block';noteGroup.style.display='none';saveBtn.disabled=true});
    subcategorySelect.addEventListener('change',()=>{if(!subcategorySelect.value){noteGroup.style.display='none';saveBtn.disabled=true;return}noteGroup.style.display='block';saveBtn.disabled=false});
    saveBtn.addEventListener('click',()=>{tasks.push({id:Date.now().toString(),date:currentDate,category:categorySelect.value,subcategory:subcategorySelect.value||'',note:noteInput.value.trim(),status:'active'});saveTasks();closeOverlay();refresh()});document.getElementById('closeOverlay').addEventListener('click',closeOverlay);document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeOverlay()});noteInput.addEventListener('focus',()=>setTimeout(()=>noteInput.scrollIntoView({behavior:'smooth',block:'center'}),200));
    function populateCategories(){categorySelect.innerHTML='<option value="">選択してください</option>';Object.keys(CATEGORY_MAP).forEach(cat=>{const opt=document.createElement('option');opt.value=cat;opt.textContent=cat;categorySelect.appendChild(opt)})}
    function refresh(){loadTasks();loadTodoMemos();renderSummary();renderCalendar();renderTodoMemos();renderDone()}
    function initFortune(){renderFortune();const hud=document.getElementById('fortuneHud'),backdrop=document.getElementById('fortunePanelBackdrop'),close=document.getElementById('fortuneClose');hud.addEventListener('click',()=>backdrop.classList.add('active'));close.addEventListener('click',()=>backdrop.classList.remove('active'));backdrop.addEventListener('click',e=>{if(e.target===backdrop)backdrop.classList.remove('active')})}
    const todoAddBtn=document.getElementById('todoAddBtn'),todoForm=document.getElementById('todoForm'),todoInput=document.getElementById('todoInput'),todoSaveBtn=document.getElementById('todoSaveBtn');function openTodoMemoInput(){todoForm.classList.add('active');todoInput.value='';todoSaveBtn.disabled=true;requestAnimationFrame(()=>setTimeout(()=>todoInput.focus({preventScroll:false}),40))}function cancelEmptyTodoMemoInput(){if(todoInput.value.trim().length===0){todoInput.value='';todoSaveBtn.disabled=true;todoForm.classList.remove('active')}}todoAddBtn.addEventListener('click',e=>{e.preventDefault();openTodoMemoInput()});todoAddBtn.addEventListener('touchend',e=>{e.preventDefault();openTodoMemoInput()},{passive:false});todoInput.addEventListener('input',()=>todoSaveBtn.disabled=todoInput.value.trim().length===0);todoInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!todoSaveBtn.disabled)todoSaveBtn.click()});todoInput.addEventListener('blur',()=>setTimeout(()=>{if(document.activeElement!==todoSaveBtn)cancelEmptyTodoMemoInput()},120));if(window.visualViewport){window.visualViewport.addEventListener('resize',()=>setTimeout(()=>{if(todoForm.classList.contains('active')&&document.activeElement!==todoInput)cancelEmptyTodoMemoInput()},160))}todoSaveBtn.addEventListener('click',()=>{const note=todoInput.value.trim();if(!note){cancelEmptyTodoMemoInput();return}todoMemos.push({id:'todo_'+Date.now().toString(),note});saveTodoMemos();todoInput.value='';todoSaveBtn.disabled=true;todoForm.classList.remove('active');renderTodoMemos()});
    populateCategories();initFortune();refresh();
  </script>
</body>
</html>
